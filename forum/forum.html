
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小论坛 · Tiny Forum</title>
<style>
  :root {
    --bg: #f1f5f9; --surface: #ffffff; --border: #e2e8f0;
    --text: #1e293b; --text2: #64748b; --text3: #94a3b8;
    --primary: #6366f1; --primary-hover: #4f46e5; --primary-light: #eef2ff;
    --danger: #ef4444; --success: #10b981;
    --radius: 12px; --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,.06); --shadow-md: 0 4px 6px rgba(0,0,0,.04);
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
  a{color:var(--primary);text-decoration:none}a:hover{text-decoration:underline}

  .container{max-width:720px;margin:0 auto;padding:0 20px}
  header{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:rgba(255,255,255,.9);backdrop-filter:blur(12px)}
  header .container{display:flex;align-items:center;justify-content:space-between;height:56px}
  .logo{font-size:18px;font-weight:700;color:var(--primary);cursor:pointer;display:flex;align-items:center;gap:6px;letter-spacing:-.3px}
  .logo:hover{text-decoration:none;opacity:.85}
  nav{display:flex;align-items:center;gap:12px}
  .nav-user{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500}
  .avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s;font-family:var(--font);white-space:nowrap}
  .btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-hover)}
  .btn-ghost{background:transparent;color:var(--text2);border-color:var(--border)}.btn-ghost:hover{background:var(--bg);color:var(--text)}
  .btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#dc2626}
  .btn-sm{padding:5px 10px;font-size:12px}.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}

  main{padding:24px 0 60px}.page{display:none}.page.active{display:block}

  .post-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:12px;cursor:pointer;transition:box-shadow .15s,border-color .15s}
  .post-card:hover{box-shadow:var(--shadow-md);border-color:#cbd5e1}
  .post-card .title{font-size:17px;font-weight:600;margin-bottom:6px;color:var(--text);display:flex;align-items:flex-start;gap:8px}
  .post-card .title a{color:inherit}.post-card .title a:hover{color:var(--primary);text-decoration:none}
  .post-card .excerpt{font-size:14px;color:var(--text2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px;line-height:1.5}
  .post-meta{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--text3);flex-wrap:wrap}
  .post-meta .meta-item{display:flex;align-items:center;gap:4px}

  .post-detail{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 28px 20px}
  .post-detail h1{font-size:24px;font-weight:700;margin-bottom:12px;line-height:1.3;letter-spacing:-.3px}
  .post-detail .content{font-size:16px;line-height:1.8;margin:16px 0 24px;white-space:pre-wrap;word-break:break-word}

  .comment-section{margin-top:24px}
  .comment-section h3{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--text2)}
  .comment-card{background:var(--bg);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:8px}
  .comment-card .comment-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px}
  .comment-card .comment-header .name{font-weight:600}
  .comment-card .comment-header .time{color:var(--text3);font-size:12px}
  .comment-card .comment-content{font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}

  .form-page{max-width:440px;margin:40px auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px}
  .form-page h2{font-size:22px;font-weight:700;margin-bottom:24px;text-align:center}
  .form-group{margin-bottom:16px}
  .form-group label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px}
  .form-group input,.form-group textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:var(--font);transition:border-color .15s;outline:none;background:var(--bg);color:var(--text)}
  .form-group input:focus,.form-group textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
  .form-group textarea{resize:vertical;min-height:180px}
  .form-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
  .form-hint{text-align:center;margin-top:16px;font-size:13px;color:var(--text2)}

  .empty{text-align:center;padding:60px 20px;color:var(--text3)}
  .empty .icon{font-size:48px;margin-bottom:12px}.empty p{font-size:15px;margin-bottom:16px}

  .toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
  .toast{padding:12px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;color:#fff;animation:slideIn .25s ease-out;box-shadow:var(--shadow-md);max-width:360px}
  .toast.error{background:var(--danger)}.toast.success{background:var(--success)}.toast.info{background:var(--primary)}
  @keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

  .back-row{margin-bottom:16px}.back-btn{font-size:14px;color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:4px}.back-btn:hover{color:var(--text)}
  .loading-spin{text-align:center;padding:40px;color:var(--text3)}
  @media(max-width:600px){.container{padding:0 14px}.post-card{padding:16px}.post-detail{padding:20px 18px 16px}.post-detail h1{font-size:20px}.form-page{padding:24px 18px}}
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="logo" onclick="navigate('/')">💬 <span class="label">小论坛</span></div>
    <nav id="nav-area"></nav>
  </div>
</header>

<div class="toast-container" id="toasts"></div>

<main class="container">
  <div class="page active" id="page-home">
    <div id="post-list"></div>
    <div id="load-more" style="text-align:center;padding:20px"></div>
  </div>

  <div class="page" id="page-post">
    <div class="back-row"><span class="back-btn" onclick="navigate('/')">← 返回列表</span></div>
    <div id="post-detail-container"></div>
    <div class="comment-section" id="comment-section"></div>
    <div id="comment-form" style="margin-top:16px"></div>
  </div>

  <div class="page" id="page-create">
    <div class="back-row"><span class="back-btn" onclick="navigate('/')">← 返回列表</span></div>
    <div class="form-page" style="max-width:720px">
      <h2>✏️ 发表新帖</h2>
      <div class="form-group"><label>标题</label><input type="text" id="create-title" placeholder="输入标题…" maxlength="200"></div>
      <div class="form-group"><label>内容</label><textarea id="create-content" placeholder="输入内容…"></textarea></div>
      <div class="form-footer">
        <button class="btn btn-ghost" onclick="navigate('/')">取消</button>
        <button class="btn btn-primary" id="btn-submit-post">发布</button>
      </div>
    </div>
  </div>

  <div class="page" id="page-login">
    <div class="form-page">
      <h2>🔑 登录</h2>
      <div class="form-group"><label>邮箱</label><input type="email" id="login-email" placeholder="输入邮箱"></div>
      <div class="form-group"><label>密码</label><input type="password" id="login-password" placeholder="输入密码" onkeydown="if(event.key==='Enter')handleLogin()"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="handleLogin()">登录</button>
      <div class="form-hint">还没有账号？<a href="#/register">立即注册 →</a></div>
    </div>
  </div>

  <div class="page" id="page-register">
    <div class="form-page">
      <h2>✨ 注册</h2>
      <div class="form-group"><label>邮箱</label><input type="email" id="register-email" placeholder="输入邮箱"></div>
      <div class="form-group"><label>用户名</label><input type="text" id="register-username" placeholder="起个名字"></div>
      <div class="form-group"><label>密码</label><input type="password" id="register-password" placeholder="至少6位" onkeydown="if(event.key==='Enter')handleRegister()"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="handleRegister()">注册</button>
      <div class="form-hint">已有账号？<a href="#/login">去登录 →</a></div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ── Supabase ─────────────────────────────────────────────
const SB = supabase.createClient(
  'https://oedshyzlmuygjlmxbtgm.supabase.co',
  'sb_publishable_J525iseeEHJELrfqkWkKvg_2oV5WjDr'
);

// ── State ────────────────────────────────────────────────
const S = { user: null, profile: null, page: '', posts: [], pageNum: 1, hasMore: false, currentPost: null, comments: [] };

// ── Toast ────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.createElement('div'); el.className = `toast ${type}`; el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 2800);
}

// ── Escape ───────────────────────────────────────────────
function esc(str) { const d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML; }

// ── Time ─────────────────────────────────────────────────
function timeAgo(d) { if(!d)return''; const t=new Date(d).getTime(),n=Date.now(),s=Math.floor((n-t)/1000); if(s<60)return'刚刚';if(s<3600)return Math.floor(s/60)+'分钟前';if(s<86400)return Math.floor(s/3600)+'小时前';return Math.floor(s/86400)+'天前'; }
function fullTime(d) { return d ? new Date(d).toLocaleString('zh-CN') : ''; }

// ── Navigate ─────────────────────────────────────────────
function navigate(path) { window.location.hash = path; }

// ── Header ───────────────────────────────────────────────
function renderHeader() {
  const nav = document.getElementById('nav-area');
  if (S.user && S.profile) {
    const c = S.profile.avatar_color || '#6366f1';
    const name = esc(S.profile.username || S.user.email.split('@')[0]);
    nav.innerHTML = `
      <button class="btn btn-primary btn-sm" onclick="navigate('/create')">+ 发帖</button>
      <div class="nav-user">
        <div class="avatar" style="background:${c}">${esc(name[0].toUpperCase())}</div>
        <span>${name}</span>
        <button class="btn btn-ghost btn-xs" onclick="handleLogout()">退出</button>
      </div>`;
  } else {
    nav.innerHTML = `
      <button class="btn btn-ghost btn-sm" onclick="navigate('/login')">登录</button>
      <button class="btn btn-primary btn-sm" onclick="navigate('/register')">注册</button>`;
  }
}

// ── Page ─────────────────────────────────────────────────
function showPage(name) {
  S.page = name;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const el = document.getElementById('page-' + name);
  if (el) el.classList.add('active');
  renderHeader();
}

// ── Load Session ─────────────────────────────────────────
async function loadSession() {
  const { data: { session } } = await SB.auth.getSession();
  if (session) {
    S.user = session.user;
    const { data: profile } = await SB.from('profiles').select('*').eq('id', S.user.id).single();
    S.profile = profile;
  }
  renderHeader();
}

// ── Home ─────────────────────────────────────────────────
async function loadPosts(append = false) {
  if (!append) { S.pageNum = 0; S.posts = []; }
  const from = S.pageNum * 20, to = from + 19;
  const { data, error } = await SB.from('posts')
    .select('id, title, content, created_at, user_id')
    .order('created_at', { ascending: false })
    .range(from, to);
  if (error) { document.getElementById('post-list').innerHTML = `<div class="empty"><div class="icon">📡</div><p>加载失败：${esc(error.message)}</p></div>`; return; }
  if (!append) S.posts = data; else S.posts = S.posts.concat(data);
  S.hasMore = data.length === 20;
  S.pageNum++;
  renderPostList();
}

async function renderPostList() {
  const container = document.getElementById('post-list');
  const loadMore = document.getElementById('load-more');
  if (S.posts.length === 0) {
    container.innerHTML = `<div class="empty"><div class="icon">🌱</div><p>还没有帖子，来发第一条吧</p>
      ${S.user ? '<button class="btn btn-primary" onclick="navigate(\'/create\')">✏️ 写帖子</button>' : '<button class="btn btn-primary" onclick="navigate(\'/login\')">登录后发帖</button>'}</div>`;
    loadMore.innerHTML = ''; return;
  }
  // Fetch profiles & comment counts
  const userIds = [...new Set(S.posts.map(p => p.user_id))];
  const { data: profiles } = await SB.from('profiles').select('id, username, avatar_color').in('id', userIds);
  const profileMap = {}; (profiles || []).forEach(p => profileMap[p.id] = p);
  // Comment counts
  const postIds = S.posts.map(p => p.id);
  const counts = {};
  for (const pid of postIds) {
    const { count } = await SB.from('comments').select('*', { count: 'exact', head: true }).eq('post_id', pid);
    counts[pid] = count || 0;
  }

  container.innerHTML = S.posts.map(p => {
    const pr = profileMap[p.user_id] || {};
    return `<div class="post-card" onclick="navigate('/post/${p.id}')">
      <div class="title">
        <span class="avatar" style="background:${pr.avatar_color||'#999'};width:24px;height:24px;font-size:11px">${esc((pr.username||'?')[0].toUpperCase())}</span>
        <a href="#/post/${p.id}" onclick="event.stopPropagation()">${esc(p.title)}</a></div>
      <div class="excerpt">${esc((p.content||'').slice(0,200))}${(p.content||'').length>200?'…':''}</div>
      <div class="post-meta"><span class="meta-item">👤 ${esc(pr.username||'?')}</span><span class="meta-item">💬 ${counts[p.id]||0} 条回复</span><span class="meta-item">🕐 ${timeAgo(p.created_at)}</span></div></div>`;
  }).join('');

  loadMore.innerHTML = S.hasMore
    ? `<button class="btn btn-ghost btn-sm" onclick="loadMorePosts()">加载更多…</button>`
    : (S.posts.length > 0 ? `<span style="color:var(--text3);font-size:13px">— 已经到底了 —</span>` : '');
}

async function loadMorePosts() { await loadPosts(true); }

// ── Post Detail ──────────────────────────────────────────
async function loadPost(id) {
  const { data: post, error } = await SB.from('posts').select('id, title, content, created_at, updated_at, user_id').eq('id', id).single();
  if (error) { document.getElementById('post-detail-container').innerHTML = `<div class="empty"><div class="icon">🔍</div><p>帖子不存在</p></div>`; return; }
  S.currentPost = post;
  const { data: profile } = await SB.from('profiles').select('*').eq('id', post.user_id).single();
  S.currentPost.profile = profile || {};
  const { data: comments } = await SB.from('comments').select('id, content, created_at, user_id').eq('post_id', id).order('created_at', { ascending: true });
  S.comments = comments || [];
  // Fetch comment profiles
  const cUserIds = [...new Set(S.comments.map(c => c.user_id))];
  const { data: cProfiles } = await SB.from('profiles').select('id, username, avatar_color').in('id', cUserIds);
  const cProfileMap = {}; (cProfiles || []).forEach(p => cProfileMap[p.id] = p);
  S.comments = S.comments.map(c => ({ ...c, profile: cProfileMap[c.user_id] || {} }));
  renderPostDetail();
}

function renderPostDetail() {
  const p = S.currentPost; if (!p) return;
  const pr = p.profile || {};
  const isOwner = S.user && S.user.id === p.user_id;
  document.getElementById('post-detail-container').innerHTML = `
    <div class="post-detail">
      <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:8px">
        <div class="avatar" style="background:${pr.avatar_color||'#999'}">${esc((pr.username||'?')[0].toUpperCase())}</div>
        <div style="flex:1"><h1>${esc(p.title)}</h1>
          <div class="post-meta" style="margin-bottom:8px"><span>${esc(pr.username||'?')}</span><span>·</span><span>${fullTime(p.created_at)}</span></div></div>
        ${isOwner ? `<button class="btn btn-ghost btn-xs" onclick="handleDeletePost(${p.id})" title="删除">🗑</button>` : ''}</div>
      <div class="content">${esc(p.content)}</div></div>`;

  const cs = document.getElementById('comment-section');
  if (S.comments.length === 0) { cs.innerHTML = `<div style="text-align:center;padding:24px;color:var(--text3);font-size:14px">还没有回复</div>`; }
  else { cs.innerHTML = `<h3>💬 ${S.comments.length} 条回复</h3>` + S.comments.map(c => {
    const cp = c.profile || {};
    return `<div class="comment-card"><div class="comment-header">
      <div class="avatar" style="background:${cp.avatar_color||'#999'};width:22px;height:22px;font-size:10px">${esc((cp.username||'?')[0].toUpperCase())}</div>
      <span class="name">${esc(cp.username||'?')}</span><span class="time">${timeAgo(c.created_at)}</span>
      ${S.user&&S.user.id===c.user_id?`<button class="btn btn-ghost btn-xs" style="margin-left:auto" onclick="handleDeleteComment(${c.id})">🗑</button>`:''}</div>
      <div class="comment-content">${esc(c.content)}</div></div>`;
  }).join(''); }

  document.getElementById('comment-form').innerHTML = S.user
    ? `<div class="form-group"><textarea id="comment-input" placeholder="写下你的回复…" rows="3"></textarea></div><button class="btn btn-primary btn-sm" onclick="handleAddComment(${p.id})">发表回复</button>`
    : `<div style="text-align:center;padding:16px;color:var(--text3);font-size:13px">请<a href="#/login">登录</a>后回复</div>`;
}

// ── Actions ──────────────────────────────────────────────
async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return toast('请填写邮箱和密码', 'error');
  const { data, error } = await SB.auth.signInWithPassword({ email, password });
  if (error) return toast(error.message, 'error');
  S.user = data.user;
  const { data: profile } = await SB.from('profiles').select('*').eq('id', S.user.id).single();
  S.profile = profile;
  toast('登录成功！', 'success');
  navigate('/');
}

async function handleRegister() {
  const email = document.getElementById('register-email').value.trim();
  const username = document.getElementById('register-username').value.trim();
  const password = document.getElementById('register-password').value;
  if (!email || !username || !password) return toast('请填写所有字段', 'error');
  if (password.length < 6) return toast('密码至少6位', 'error');
  const { data, error } = await SB.auth.signUp({ email, password, options: { data: { username } } });
  if (error) return toast(error.message, 'error');
  if (data.session) {
    S.user = data.user;
    // Wait a moment for trigger to create profile
    await new Promise(r => setTimeout(r, 500));
    const { data: profile } = await SB.from('profiles').select('*').eq('id', S.user.id).single();
    S.profile = profile;
    toast('注册成功！', 'success');
    navigate('/');
  } else {
    toast('注册成功！请检查邮箱确认（或关闭邮箱验证后再试）', 'info');
  }
}

async function handleLogout() {
  await SB.auth.signOut();
  S.user = null; S.profile = null;
  toast('已退出');
  navigate('/');
}

async function handleCreatePost() {
  const title = document.getElementById('create-title').value.trim();
  const content = document.getElementById('create-content').value.trim();
  if (!title) return toast('请输入标题', 'error');
  if (!content) return toast('请输入内容', 'error');
  const { error } = await SB.from('posts').insert({ title, content, user_id: S.user.id });
  if (error) return toast(error.message, 'error');
  toast('发布成功！', 'success');
  navigate('/');
}

async function handleDeletePost(id) {
  if (!confirm('确定删除这条帖子吗？')) return;
  const { error } = await SB.from('posts').delete().eq('id', id);
  if (error) return toast(error.message, 'error');
  toast('已删除', 'success');
  navigate('/');
}

async function handleAddComment(postId) {
  const content = document.getElementById('comment-input').value.trim();
  if (!content) return toast('请输入回复内容', 'error');
  const { error } = await SB.from('comments').insert({ post_id: postId, content, user_id: S.user.id });
  if (error) return toast(error.message, 'error');
  document.getElementById('comment-input').value = '';
  toast('回复成功！', 'success');
  await loadPost(postId);
}

async function handleDeleteComment(id) {
  if (!confirm('确定删除这条回复吗？')) return;
  const { error } = await SB.from('comments').delete().eq('id', id);
  if (error) return toast(error.message, 'error');
  toast('已删除', 'success');
  await loadPost(S.currentPost.id);
}

// ── Router ───────────────────────────────────────────────
async function handleRoute() {
  const hash = window.location.hash.slice(1) || '/';
  const [path, id] = hash.split('/').filter(Boolean);
  if (!path || path === '/') { showPage('home'); await loadPosts(); }
  else if (path === 'login') { showPage('login'); if (S.user) navigate('/'); }
  else if (path === 'register') { showPage('register'); if (S.user) navigate('/'); }
  else if (path === 'post' && id) { showPage('post'); await loadPost(id); }
  else if (path === 'create') {
    if (!S.user) { toast('请先登录', 'error'); navigate('/login'); return; }
    showPage('create');
    document.getElementById('create-title').value = '';
    document.getElementById('create-content').value = '';
  }
  else { showPage('home'); await loadPosts(); }
}

// ── Init ─────────────────────────────────────────────────
window.addEventListener('hashchange', handleRoute);
window.addEventListener('DOMContentLoaded', async () => {
  await loadSession();
  await handleRoute();
  document.getElementById('btn-submit-post').addEventListener('click', handleCreatePost);
});
</script>
</body>
