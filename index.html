<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片裁剪工具</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 900px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 24px 32px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .header p {
            margin-top: 6px;
            opacity: 0.85;
            font-size: 0.95rem;
        }

        .main {
            padding: 32px;
        }

        /* 上传区域 */
        .upload-zone {
            border: 3px dashed #d0d5e0;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafbfc;
        }

        .upload-zone:hover {
            border-color: #667eea;
            background: #f0f1ff;
        }

        .upload-zone.dragover {
            border-color: #667eea;
            background: #eef0ff;
            transform: scale(1.01);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .upload-zone h3 {
            color: #333;
            margin-bottom: 6px;
        }

        .upload-zone p {
            color: #888;
            font-size: 0.9rem;
        }

        #fileInput {
            display: none;
        }

        /* 裁剪区域 */
        .cropper-wrapper {
            display: none;
        }

        .img-container {
            max-height: 500px;
            background: #f0f0f0;
        }

        .img-container img {
            max-width: 100%;
            display: block;
        }

        /* 工具栏 */
        .toolbar {
            display: none;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
            align-items: center;
        }

        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
        }

        .btn-success:hover {
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.4);
        }

        .btn-outline {
            background: white;
            color: #555;
            border: 2px solid #d0d5e0;
        }

        .btn-outline:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #ee5a5a;
        }

        .btn-sm {
            padding: 7px 16px;
            font-size: 0.85rem;
        }

        .ratio-group {
            display: flex;
            gap: 6px;
        }

        .separator {
            color: #ccc;
            margin: 0 4px;
        }

        /* 结果区域 */
        .result-section {
            display: none;
            margin-top: 24px;
            text-align: center;
        }

        .result-section h3 {
            margin-bottom: 12px;
            color: #333;
        }

        .result-preview {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .info-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            color: #888;
            font-size: 0.85rem;
        }

        @media (max-width: 600px) {
            .header { padding: 18px 20px; }
            .header h1 { font-size: 1.4rem; }
            .main { padding: 20px; }
            .toolbar { gap: 6px; }
            .btn { padding: 8px 14px; font-size: 0.85rem; }
            .ratio-group { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🖼️ 图片裁剪工具</h1>
        <p>上传图片，自由裁剪，一键下载</p>
    </div>

    <div class="main">
        <!-- 上传区 -->
        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">📁</div>
            <h3>点击上传或拖拽图片到此处</h3>
            <p>支持 JPG、PNG、WebP、GIF 等常见格式</p>
        </div>
        <input type="file" id="fileInput" accept="image/*">

        <!-- 裁剪区 -->
        <div class="cropper-wrapper" id="cropperWrapper">
            <div class="img-container">
                <img id="image" alt="待裁剪图片">
            </div>
        </div>

        <!-- 工具栏 -->
        <div class="toolbar" id="toolbar">
            <button class="btn btn-outline btn-sm" id="btnReset" title="重置裁剪">🔄 重置</button>

            <span class="separator">|</span>

            <div class="ratio-group">
                <button class="btn btn-outline btn-sm ratio-btn active" data-ratio="NaN">自由</button>
                <button class="btn btn-outline btn-sm ratio-btn" data-ratio="1">1:1</button>
                <button class="btn btn-outline btn-sm ratio-btn" data-ratio="4/3">4:3</button>
                <button class="btn btn-outline btn-sm ratio-btn" data-ratio="16/9">16:9</button>
                <button class="btn btn-outline btn-sm ratio-btn" data-ratio="3/4">3:4</button>
                <button class="btn btn-outline btn-sm ratio-btn" data-ratio="9/16">9:16</button>
            </div>

            <span class="separator">|</span>

            <button class="btn btn-outline btn-sm" id="btnRotate" title="旋转 90°">↻ 旋转</button>
            <button class="btn btn-outline btn-sm" id="btnFlipH" title="水平翻转">↔ 翻转</button>
            <button class="btn btn-outline btn-sm" id="btnZoomIn" title="放大">🔍+</button>
            <button class="btn btn-outline btn-sm" id="btnZoomOut" title="缩小">🔍−</button>

            <span class="separator">|</span>

            <button class="btn btn-success" id="btnCrop">✂️ 裁剪并预览</button>
            <button class="btn btn-danger btn-sm" id="btnCancel">✕ 重新选择</button>
        </div>

        <!-- 结果展示 -->
        <div class="result-section" id="resultSection">
            <h3>✅ 裁剪结果</h3>
            <img class="result-preview" id="resultImage" alt="裁剪结果">
            <div class="info-row" id="resultInfo"></div>
            <br>
            <button class="btn btn-primary" id="btnDownload">⬇️ 下载裁剪后的图片</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<script>
(function() {
    // DOM 元素
    const uploadZone  = document.getElementById('uploadZone');
    const fileInput   = document.getElementById('fileInput');
    const cropperWrap = document.getElementById('cropperWrapper');
    const imageEl     = document.getElementById('image');
    const toolbar     = document.getElementById('toolbar');
    const resultSec   = document.getElementById('resultSection');
    const resultImg   = document.getElementById('resultImage');
    const resultInfo  = document.getElementById('resultInfo');

    let cropper = null;

    // ── 上传区域：点击 / 拖拽 ──────────────────────────
    uploadZone.addEventListener('click', () => fileInput.click());

    uploadZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadZone.classList.add('dragover');
    });

    uploadZone.addEventListener('dragleave', () => {
        uploadZone.classList.remove('dragover');
    });

    uploadZone.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadZone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) loadImage(file);
    });

    fileInput.addEventListener('change', () => {
        const file = fileInput.files[0];
        if (file) loadImage(file);
    });

    // ── 加载图片 ───────────────────────────────────────
    function loadImage(file) {
        if (!file.type.startsWith('image/')) {
            alert('请选择一个图片文件！');
            return;
        }

        const reader = new FileReader();
        reader.onload = (e) => {
            // 销毁旧 cropper
            if (cropper) {
                cropper.destroy();
                cropper = null;
            }

            imageEl.src = e.target.result;

            // 显示裁剪区，隐藏上传区和结果区
            uploadZone.style.display = 'none';
            cropperWrap.style.display = 'block';
            toolbar.style.display = 'flex';
            resultSec.style.display = 'none';

            // 初始化 Cropper
            cropper = new Cropper(imageEl, {
                viewMode: 1,
                dragMode: 'move',
                autoCropArea: 0.8,
                responsive: true,
                background: false,
                ready() {
                    // 高亮自由比例按钮
                    setActiveRatioBtn(NaN);
                },
            });
        };
        reader.readAsDataURL(file);
    }

    // ── 比例按钮 ──────────────────────────────────────
    document.querySelectorAll('.ratio-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const raw = btn.dataset.ratio;
            // 用 eval 安全计算，也可手写：只支持 NaN, 1, 4/3, 16/9, 3/4, 9/16
            const ratio = raw === 'NaN' ? NaN : eval(raw);
            cropper.setAspectRatio(ratio);
            setActiveRatioBtn(ratio);
        });
    });

    function setActiveRatioBtn(ratio) {
        document.querySelectorAll('.ratio-btn').forEach(b => {
            const bRaw = b.dataset.ratio;
            const bVal = bRaw === 'NaN' ? NaN : eval(bRaw);
            // NaN !== NaN，所以需要特殊判断
            const match = (isNaN(ratio) && isNaN(bVal)) || (bVal === ratio);
            b.classList.toggle('active', match);
        });
    }

    // ── 工具栏操作 ────────────────────────────────────
    document.getElementById('btnReset').addEventListener('click', () => cropper.reset());
    document.getElementById('btnRotate').addEventListener('click', () => cropper.rotate(90));
    document.getElementById('btnFlipH').addEventListener('click', () => {
        const data = cropper.getData();
        cropper.scaleX(data.scaleX === -1 ? 1 : -1);
    });
    document.getElementById('btnZoomIn').addEventListener('click',  () => cropper.zoom(0.1));
    document.getElementById('btnZoomOut').addEventListener('click', () => cropper.zoom(-0.1));

    // ── 裁剪并预览 ────────────────────────────────────
    document.getElementById('btnCrop').addEventListener('click', () => {
        if (!cropper) return;

        const canvas = cropper.getCroppedCanvas();
        if (!canvas) {
            alert('裁剪失败，请重试。');
            return;
        }

        const dataURL = canvas.toDataURL('image/png');
        resultImg.src = dataURL;
        resultInfo.innerHTML = `
            <span>宽度: ${canvas.width}px</span>
            <span>高度: ${canvas.height}px</span>
        `;
        resultSec.style.display = 'block';
        resultSec.scrollIntoView({ behavior: 'smooth' });

        // 存一份用于下载
        resultImg._canvas = canvas;
    });

    // ── 下载 ──────────────────────────────────────────
    document.getElementById('btnDownload').addEventListener('click', () => {
        const canvas = resultImg._canvas;
        if (!canvas) {
            alert('请先裁剪图片！');
            return;
        }
        const link = document.createElement('a');
        link.download = 'cropped-image.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });

    // ── 重新选择 ──────────────────────────────────────
    document.getElementById('btnCancel').addEventListener('click', () => {
        if (cropper) {
            cropper.destroy();
            cropper = null;
        }
        imageEl.src = '';
        cropperWrap.style.display = 'none';
        toolbar.style.display = 'none';
        resultSec.style.display = 'none';
        uploadZone.style.display = 'block';
        fileInput.value = '';
    });

})();
</script>
</body>
</html>
